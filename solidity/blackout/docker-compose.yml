name: blackout-challenge

services:
  launcher:
    environment:
      CHALLENGE: blackout
      FLAG: "WCTF{d1rty_b1ts_cl34n_3x1t}"
    container_name: blackout
    image: blackout
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
