name: overseer-challenge

services:
  launcher:
    environment:
      CHALLENGE: overseer
      FLAG: "WCTF{H4T5_0NLY_4T_N1GH7}"
    container_name: overseer
    image: overseer
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
