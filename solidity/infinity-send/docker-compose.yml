name: infinity-send-challenge

services:
  launcher:
    environment:
      CHALLENGE: infinity-send
      FLAG: "WCTF{INFINITY_TOKENS_STOPPED}"
    container_name: infinity-send
    image: infinity-send
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
