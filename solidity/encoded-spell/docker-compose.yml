name: encoded-spell-challenge

services:
  launcher:
    environment:
      CHALLENGE: encoded-spell
      FLAG: "WCTF{Blessing_breeze_blow_in_energy!_Curaga!}"
    container_name: encoded-spell
    image: encoded-spell
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
