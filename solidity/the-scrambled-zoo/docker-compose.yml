name: the-scrambled-zoo-challenge

services:
  launcher:
    environment:
      CHALLENGE: the-scrambled-zoo
      FLAG: "WCTF{4N1M4L5_C0MPU73_4N1M4L5_C0MP3T3_J01N_7H3_Z00}"
    container_name: the-scrambled-zoo
    image: the-scrambled-zoo
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
