name: precompile20-challenge

services:
  launcher:
    environment:
      CHALLENGE: precompile20
      FLAG: "WCTF{PR3C0MP1L35_D0_Y0U_KN0W_TH3M}"
    container_name: precompile20
    image: precompile20
    build: .
    command: socat TCP-LISTEN:1337,reuseaddr,fork EXEC:"python3 -u challenge.py",pty,stderr,setsid,sigint,sane
    expose:
      - 1337
    ports:
      - "1337:1337"
    networks:
      - ctf_network

networks:
  ctf_network:
    name: wonderlandctf
    external: true
